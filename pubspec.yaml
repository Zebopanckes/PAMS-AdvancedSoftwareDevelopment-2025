name: pams
description: Paragon Apartment Management System - A comprehensive desktop application for managing multi-location apartment businesses.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Animations
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  lottie: ^3.1.0
  
  # State Management
  provider: ^6.1.2
  flutter_bloc: ^8.1.5
  
  # Database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  
  # Security & Authentication
  crypto: ^3.0.3
  local_auth: ^2.2.0
  shared_preferences: ^2.2.3
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.3
  
  # Charts & Visualization
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^25.1.35

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  
  # Fonts section removed - using system default fonts
  # Custom fonts can be added later if needed
