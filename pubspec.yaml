name: pams
description: Paragon Apartment Management System - A comprehensive desktop application for managing multi-location apartment businesses.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Animations
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  lottie: ^3.1.0
  
  # State Management
  provider: ^6.1.2
  flutter_bloc: ^9.1.1
  
  # Database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  
  # Security & Authentication
  crypto: ^3.0.3
  bcrypt: ^1.1.3
  local_auth: ^3.0.1
  shared_preferences: ^2.2.3
  
  # Window management
  window_manager: ^0.5.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.3
  
  # Charts & Visualization
  fl_chart: ^1.2.0
  syncfusion_flutter_charts: ^33.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  
  # Fonts section removed - using system default fonts
  # Custom fonts can be added later if needed
